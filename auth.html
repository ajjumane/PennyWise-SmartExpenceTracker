<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pennywise: Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/17014/17014901.png">
</head>
<body class="flex items-center justify-center min-h-screen bg-app-bg text-primary font-outfit"> 

    <div id="auth-wrapper" class="auth-container premium-glass">
        
        <form id="signupForm" class="space-y-4">
            <h2 class="text-3xl font-bold text-white mb-2 text-center tracking-tight">Create Account</h2>
            
            <div class="flex justify-center items-center text-sm mb-6 pb-2 space-x-2">
                <p class="text-gray-400">Already have an account?</p>
                <a href="#" id="toLogin" class="text-emerald-400 font-medium hover:text-emerald-300 transition-colors">Sign in</a>
            </div>

            <input type="text" id="signupUsername" placeholder="Username" required 
                class="rounded-input">
            <input type="email" id="signupEmail" placeholder="Email" required 
                class="rounded-input">
            <input type="password" id="signupPassword" placeholder="Password" required 
                class="rounded-input">
            
            <button type="submit" class="auth-button">
                Sign up
            </button>
        </form>

        <form id="loginForm" class="space-y-6 hidden">
            <h2 class="text-3xl font-bold text-white mb-2 text-center tracking-tight">Welcome Back</h2>
            
            <div class="flex items-center justify-center text-sm mb-5 pb-2 space-x-2">
                <p class="text-gray-400">Don't have an account?</p>
                <a href="#" id="toSignup" class="text-emerald-400 font-medium hover:text-emerald-300 transition-colors">Sign up</a>
            </div>

            <input type="text" id="loginUsername" placeholder="Username" required 
                class="rounded-input">
            <input type="password" id="loginPassword" placeholder="Password" required 
                class="rounded-input">
            <button type="submit" class="auth-button">
                Sign in
            </button>
        </form>
    </div>

    <script defer src="script.js"></script>
</body>
</html>
